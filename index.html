<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>StealthPay</title><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0e17;--c:#131a2b;--p:#00d4aa;--t:#e8e8e8;--d:#6b7280;--r:#ef4444;--g:#22c55e;--b:#3b82f6}body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}.hidden{display:none!important}.auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}.alogo{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--p),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}.asub{color:var(--d);font-size:13px;margin-bottom:32px}.aform{width:100%;max-width:340px}.ainp{width:100%;padding:14px 16px;background:var(--c);border:1px solid #1e293b;border-radius:12px;color:var(--t);font-size:15px;margin-bottom:12px;outline:none}.ainp:focus{border-color:var(--p)}.abtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--b));border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}.aswi{color:var(--d);font-size:13px;margin-top:16px;text-align:center}.aswi span{color:var(--p);cursor:pointer}.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px}.hlogo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--p),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hact{display:flex;gap:8px;align-items:center}.lbtn{padding:4px 10px;background:var(--c);border:1px solid #1e293b;border-radius:8px;color:var(--p);font-size:12px;font-weight:700;cursor:pointer}.nbtn{width:32px;height:32px;background:var(--c);border:1px solid #1e293b;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}.bsec{text-align:cente nd:var(--c);border-radius:12px;padding:3px}.mtb{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--d)}.mtb.on{background:var(--p);color:#000}.vi{background:linear-gradient(135deg,#0f172a,#1e293b);border:1px solid #334155;border-radius:14px;padding:14px;margin:12px 0}.vr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px}.vl{color:var(--d)}.vv{font-family:monospace;color:var(--p);font-weight:600}.ps{margin:16px 0}.psi{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:var(--d)}.psi.dn{color:var(--g)}.pd{width:20px;height:20px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}.si{width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.15);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px}.vc{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-radius:16px;padding:20px;margin:12px 0;position:relative;overflow:hidden}.vca{display:flex;gap:8px;margin-top:12px}.vcab{flex:1;padding:10px;background:var(--c);border-radius:10px;border:none;color:var(--t);font-size:12px;cursor:pointer}.swc{display:flex;align-items:center;gap:12px;margin:16px 0}.swi{flex:1;padding:14px;background:var(--c);border-radius:14px;text-align:center}.swr{width:40px;height:40px;border-radius:50%;background:var(--c);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;border:none;color:var(--p)}.stg{display:flex;flex-direction:column;gap:12px}.stgb{background:var(--c);border-radius:14px;padding:14px}.stgl{font-size:11px;color:var(--d);margin-bottom:10px}.str{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1e293b;font-size:13px}.str:last-child{border-bottom:none}</style></head><body><div id="authPage" class="auth"><div class="alogo">StealthPay</div><div class="asub">Stealth Wallet</div><div class="aform"><input class="ainp" id="aEmail" placeholder="Email" type="email"><input class="ainp" id="aPass" placeholder="Password" type="password"><button class="abtn" onclick="doAuth()">Login</button><div class="aswi">No account? <span onclick="toggleAuth()">Register</span></div></div></div><div id="app" class="hidden"><div class="hdr"><div class="hlogo">StealthPay</div><div class="hact"><button class="lbtn" id="langBtn" onclick="togLang()">EN</button><div class="nbtn">&#x1F514;</div></div></div><div class="bsec"><div class="blbl">Total</div><div class="bamt" id="totalBal">$0</div><div class="bchg">&uarr; 2.4% 24h</div></div><div class="wscr" id="wallets"></div><div class="acts"><button class="abx" onclick="openDeposit()"><div class="aix dep">&darr;</div><span>Deposit</span></button><button class="abx" onclick="openSend()"><div class="aix snd">&uarr;</div><span>Send</span></button><button class="abx" onclick="openSwap()"><div class="aix swp">&#x21C4;</div><span>Swap</span></button><button class="abx" onclick="openCard()"><div class="aix crd">&#x1F4B3;</div><span>Card</span></button></div><div class="shd"><h3>History</h3><span>All &rarr;</span></div><div class="txl" id="txList"></div></div><div class="bnav" id="nav"></div><div id="modal" class="hidden"></div><script>var lang='en',W={USD:1250,EUR:980,BTC:0.035,ETH:1.2,USDC:500,XMR:2.8},R={BTC:85000,ETH:3200,USDC:1,XMR:355,EUR:1.08},TX=[{t:'RTP Deposit',a:'+$500',c:'i',tm:'14:22'},{t:'Send ETH',a:'-0.5 ETH',c:'o',tm:'12:05'},{t:'Swap BTC/USD',a:'+$850',c:'s',tm:'09:41'}];var T={en:{login:'Login',register:'Register',noacc:'No account?',haveacc:'Have account?',total:'Total',dep:'Deposit',send:'Send',swap:'Swap',card:'Card',hist:'History',home:'Home',settings:'Settings',confirm:'Confirm',cancel:'Cancel',amt:'Amount',success:'Success',newbal:'New Balance',txid:'TX ID',from:'From',to:'To',rate:'Rate',freeze:'Freeze',show:'Show',hide:'Hide',logout:'Logout',security:'Security',notifications:'Notifications',language:'Language',appearance:'Appearance',about:'About',profile:'Profile',darkmode:'Dark Mode',biometric:'Biometric',change:'Change',txalert:'Transactions',pricealert:'Price Alerts',secalert:'Security Alerts'},zh:{login:'登录',register:'注册',noacc:'没有账号?',haveacc:'已有账号?',total:'总余额',dep:'充值',send:'发送',swap:'兑换',card:'卡片',hist:'历史',home:'主页',settings:'设置',confirm:'确认',cancel:'取消',amt:'金额',success:'成功',newbal:'新余额',txid:'交易ID',from:'从',to:'至',rate:'汇率',freeze:'冻结',show:'显示',hide:'隐藏',logout:'退出',security:'安全',notifications:'通知',language:'语言',appearance:'外观',about:'关于',profile:'账户',darkmode:'深色模式',biometric:'生物识别',change:'修改',txalert:'交易提醒',pricealert:'价格提醒',secalert:'安全警告'}};function t(k){return T[lang][k]||k}function $(id){return document.getElementById(id)}function doAuth(){$('authPage').classList.add('hidden');$('app').classList.remove('hidden');render()}function toggleAuth(){var b=$('authPage');var btn=b.querySelector('.abtn');var sw=b.querySelector('.aswi');if(btn.textContent===t('login')){btn.textContent=t('register');sw.innerHTML=t('haveacc')+' <span onclick="toggleAuth()">'+t('login')+'</span>'}else{btn.textContent=t('login');sw.innerHTML=t('noacc')+' <span onclick="toggleAuth()">'+t('register')+'</span>'}}function togLang(){lang=lang==='en'?'zh':'en';$('langBtn').textContent=lang==='en'?'ZH':'EN';render()}function genVirt(){var r=Math.floor(Math.random()*9e8).toString();var a='VP'+Math.floor(Math.random()*9e9).toString();var tok='stlp_'+Math.random().toString(36).substr(2,10);return{r:r.slice(0,3)+'***'+r.slice(-2),a:a.slice(0,4)+'***'+a.slice(-3),t:tok.slice(0,10)+'...'}}function genTxId(){return 'TXN-'+Date.now().toString(36).toUpperCase()}function toUSD(sym,amt){if(sym==='USD'||sym==='USDC')return amt;return amt*(R[sym]||1)}function totalUSD(){var s=0;for(var k in W)s+=toUSD(k,W[k]);return s}function render(){$('totalBal').textContent='$'+totalUSD().toFixed(2);var icons={USD:'$',EUR:'€',BTC:'₿',ETH:'Ξ',USDC:'U',XMR:'ɱ'};var wh='';for(var k in W){var u=toUSD(k,W[k]);wh+='<div class="wc"><div class="wci">'+icons[k]+'</div><div style="font-size:11px;color:var(--d)">'+k+'</div><div class="wcb">'+W[k]+'</div><div style="font-size:11px;color:var(--d)">~$'+u.toFixed(2)+'</div></div>'}$('wallets').innerHTML=wh;var th='';TX.forEach(function(tx){th+='<div class="txi"><div class="txic '+tx.c+'">'+(tx.c==='i'?'↓':tx.c==='o'?'↑':'⇄')+'</div><div class="txif"><div class="txn">'+tx.t+'</div><div class="txt">'+tx.tm+'</div></div><div class="txa"><div class="txv '+(tx.c==='i'?'pos':'neg')+'">'+tx.a+'</div><div class="txs">✓</div></div></div>'});$('txList').innerHTML=th;$('nav').innerHTML='<button class="bni on" onclick="navTo(this)"><div class="ni">🏠</div><span>'+t('home')+'</span></button><button class="bni" onclick="openDeposit();navTo(this)"><div class="ni">↓</div><span>'+t('dep')+'</span></button><div class="bnc" onclick="openDeposit()">⚡</div><button class="bni" onclick="openSwap();navTo(this)"><div class="ni">⇄</div><span>'+t('swap')+'</span></button><button class="bni" onclick="openSettings();navTo(this)"><div class="ni">⚙️</div><span>'+t('settings')+'</span></button>'}function navTo(el){document.querySelectorAll('.bni').forEach(function(b){b.classList.remove('on')});el.classList.add('on')}function showModal(html){var m=$('modal');m.className='mo';m.innerHTML='<div class="ms"><div class="mh"></div><button class="mc" onclick="closeModal()">✕</button>'+html+'</div>';m.onclick=function(e){if(e.target===m)closeModal()}}function closeModal(){$('modal').className='hidden';$('modal').innerHTML=''}var depCur='USD',depMeth='bank';function openDeposit(){var crypto=['BTC','ETH','XMR'];var isCrypto=crypto.includes(depCur);var chips='';['USD','EUR','BTC','ETH','USDC','XMR'].forEach(function(c){chips+='<div class="ch'+(c===depCur?' on':'')+' " onclick="depCur=\''+c+'\';openDeposit()">'+c+'</div>'});var form='';if(isCrypto){form='<div class="fg"><div class="fl">Address</div><input class="fi" id="dAddr" placeholder="'+(depCur==='XMR'?'4...':depCur==='BTC'?'bc1q...':'0x...')+'"></div>'}else if(depMeth==='bank'){if(depCur==='EUR'){form='<div class="fg"><div class="fl">IBAN</div><input class="fi" id="dIban" placeholder="DE89 3704..."></div><div class="fg"><div class="fl">BIC</div><input class="fi" id="dBic" placeholder="COBADEFFXXX"></div>'}else{form='<div class="fg"><div class="fl">Bank</div><input class="fi" id="dBank" placeholder="Bank name"></div><div class="fr"><div class="fg"><div class="fl">Routing #</div><input class="fi" id="dRouting" placeholder="9 digits" maxlength="9"></div><div class="fg"><div class="fl">Account #</div><input class="fi" id="dAcc" placeholder="Account #"></div></div><div class="fg"><div class="fl">Type</div><select class="fs" id="dType"><option>Checking</option><option>Savings</option></select></div>'}}else{form='<div class="fg"><div class="fl">Card #</div><input class="fi" id="dCard" placeholder="0000 0000 0000 0000" maxlength="19"></div><div class="fr"><div class="fg"><div class="fl">Expiry</div><input class="fi" id="dExp" placeholder="MM/YY" maxlength="5"></div><div class="fg"><div class="fl">CVV</div><input class="fi" id="dCvv" placeholder="***" maxlength="4" type="password"></div></div>'}var tabs=isCrypto?'':'<div class="mtbs"><div class="mtb'+(depMeth==='bank'?' on':'')+' " onclick="depMeth=\'bank\';openDeposit()">&#x1F3E6; Bank</div><div class="mtb'+(depMeth==='debit'?' on':'')+' " onclick="depMeth=\'debit\';openDeposit()">&#x1F4B3; Card</div></div>';showModal('<div class="mt">⚡ '+t('dep')+'</div><div class="cr">'+chips+'</div>'+tabs+form+'<div class="fg"><div class="fl">'+t('amt')+'</div><input class="fi" id="dAmt" type="number" placeholder="0.00"><div class="cr" style="margin-top:6px"><div class="ch" onclick="document.getElementById(\'dAmt\').value=\'100\'">100</div><div class="ch" onclick="document.getElementById(\'dAmt\').value=\'500\'">500</div><div class="ch" onclick="document.getElementById(\'dAmt\').value=\'1000\'">1K</div></div></div><div style="text-align:center;color:var(--d);font-size:11px;margin:8px 0">RTP® · ⚡ · 24/7 · $0 fee</div><button class="abtn" onclick="doDeposit()">⚡ '+t('confirm')+'</button>')}function doDeposit(){var amt=parseFloat(document.getElementById('dAmt')?document.getElementById('dAmt').value:0);if(!amt||amt<=0){alert('Enter amount');return}var v=genVirt();var isCrypto=['BTC','ETH','XMR'].includes(depCur);var steps=['Encrypt data','Activate proxy','Connect RTP','Submit','Confirm','Destroy keys'];var h='<div class="mt">⚡ Processing</div><div class="vi"><div class="vr"><span class="vl">Route</span><span class="vv">'+v.r+'</span></div><div class="vr"><span class="vl">Acct</span><span class="vv">'+v.a+'</span></div><div class="vr"><span class="vl">Token</span><span class="vv">'+v.t+'</span></div></div><div class="ps" id="pSteps">';steps.forEach(function(s,i){h+='<div class="psi" id="ps'+i+'"><div class="pd"></div>'+s+'</div>'});h+='</div>';showModal(h);var i=0;var iv=setInterval(function(){if(i<steps.length){var el=document.getElementById('ps'+i);if(el){el.classList.add('dn');el.querySelector('.pd').textContent='✓'}i++}else{clearInterval(iv);W[depCur]=(W[depCur]||0)+amt;TX.unshift({t:depCur+' Deposit',a:'+'+amt+' '+depCur,c:'i',tm:new Date().toTimeString().slice(0,5)});setTimeout(function(){showModal('<div style="text-align:center"><div class="si">✓</div><div class="mt" style="justify-content:center">'+t('success')+'</div><div style="font-size:24px;font-weight:800;margin:8px 0">+'+amt+' '+depCur+'</div><div style="color:var(--d);font-size:12px">'+t('newbal')+': '+W[depCur].toFixed(depCur==='BTC'?4:2)+' '+depCur+'</div><div style="color:var(--d);font-size:11px;margin-top:6px">'+t('txid')+': '+genTxId()+'</div><div class="vi" style="margin-top:10px"><div class="vr"><span class="vl">Virtual</span><span class="vv" style="color:var(--r)">🗑 Destroyed</span></div></div><button class="abtn" onclick="closeModal();render()" style="margin-top:14px">OK</button></div>')},400)}},600)}var sendCur
